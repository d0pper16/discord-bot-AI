name: Auto-create PR feat/yanto-bot -> main

# Buat PR otomatis kalau commit pakai "[skip sync]" (skip auto-fast-forward).
# Berguna kalau perubahan butuh review dulu sebelum masuk ke main.

on:
  push:
    branches:
      - feat/yanto-bot

permissions:
  contents: read
  pull-requests: write

jobs:
  ensure-pr:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.head_commit.message, '[skip sync]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Create or update PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          existing=$(gh pr list --base main --head feat/yanto-bot --state open --json number --jq '.[0].number' || echo "")
          if [ -n "$existing" ]; then
            echo "PR #$existing sudah ada untuk feat/yanto-bot -> main"
          else
            gh pr create \
              --base main \
              --head feat/yanto-bot \
              --title "feat: sync feat/yanto-bot -> main" \
              --body "Auto-PR dari workflow. Commit pakai \`[skip sync]\` jadi tidak di-fast-forward otomatis. Review & merge manual."
            echo "PR baru dibuat."
          fi
